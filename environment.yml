name: wav2lip
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.9
  - numpy=1.23.5
  - scipy
  - matplotlib
  - pip

  # audio + ML deps via conda (more stable)
  - librosa=0.9.2
  - numba=0.56

  - pip:
      # PyTorch CPU (stable version for Wav2Lip)
      - torch==1.13.1
      - torchvision==0.14.1
      - torchaudio==0.13.1

      # video + utils
      - opencv-python==4.5.5.64
      - tqdm==4.64.1

      # optional but useful
      - ffmpeg-python